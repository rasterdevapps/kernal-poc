<header class="app-header">
  <div class="header-left">
    @if (breakpoint.isMobile() || breakpoint.isTablet()) {
      <button class="menu-toggle" (click)="onMenuToggle()" aria-label="Toggle navigation menu">
        <span class="hamburger-icon">☰</span>
      </button>
    }
    <a routerLink="/dashboard" class="logo-link">
      <span class="logo-icon">◈</span>
      <span class="logo-text">ERP Kernel</span>
    </a>
  </div>

  <div class="header-center">
    <div class="tcode-input-wrapper">
      <span class="tcode-prefix">▶</span>
      <input
        type="text"
        class="tcode-input"
        placeholder="Enter T-Code (e.g. SU01)"
        [value]="tcodeInput()"
        (input)="onInput($event)"
        (keydown)="onKeyDown($event)"
        aria-label="T-Code command input"
      />
      <button class="tcode-submit" (click)="onTCodeSubmit()" aria-label="Execute T-Code">
        ↵
      </button>
    </div>
  </div>

  <div class="header-right">
    <button class="header-icon-btn" aria-label="Notifications">
      <span class="icon">🔔</span>
    </button>
    @if (!breakpoint.isMobile()) {
      <button class="header-icon-btn" aria-label="Help">
        <span class="icon">❓</span>
      </button>
    }
    <div class="user-menu">
      <span class="user-avatar">U</span>
      @if (!breakpoint.isMobile()) {
        <span class="user-name">User</span>
      }
    </div>
  </div>
</header>
