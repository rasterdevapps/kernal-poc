<div class="layout" [class.mobile]="breakpoint.isMobile()" [class.tablet]="breakpoint.isTablet()">
  <app-header (tcodeSubmitted)="onTCodeSubmitted($event)" (menuToggled)="toggleMobileSidebar()" />
  <div class="layout-body">
    @if (breakpoint.isMobile() || breakpoint.isTablet()) {
      @if (mobileSidebarOpen()) {
        <div class="sidebar-overlay" (click)="closeMobileSidebar()"></div>
      }
      <app-sidebar [class.open]="mobileSidebarOpen()" (navigationSelected)="closeMobileSidebar()" />
    } @else {
      <app-sidebar />
    }
    <main class="layout-content">
      <router-outlet />
    </main>
  </div>
  <app-footer />
  <app-bottom-nav />
</div>
