# Local development profile — uses H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:erp_kernel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    locations: classpath:db/migration

# WARNING: Replace this key with a secure, randomly-generated key in production.
# Never commit production keys to version control.
erp:
  encryption:
    secret-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  api:
    jwt:
      secret-key: ZXJwLWtlcm5lbC1kZXYta2V5LW11c3QtYmUtMzItYnl0ZXM=
    cors:
      allowed-origins:
        - "http://localhost:4200"
        - "http://localhost:3000"
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true
      max-age: 3600
  security:
    ldap:
      enabled: false
    sso:
      enabled: false
