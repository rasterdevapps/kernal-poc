# Local development profile — uses H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:erp_kernel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    locations: classpath:db/migration
