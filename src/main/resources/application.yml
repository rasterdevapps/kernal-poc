spring:
  application:
    name: erp-kernel

  profiles:
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

erp:
  api:
    jwt:
      expiration-minutes: 60
      issuer: erp-kernel
    rate-limit:
      enabled: true
      requests-per-second: 100
      burst-capacity: 200
    cors:
      allowed-origins:
        - "*"
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: false
      max-age: 3600

  resilience:
    circuit-breaker:
      failure-threshold: 5
      half-open-max-calls: 3
      open-state-duration-seconds: 60
    backup:
      enabled: true
      retention-days: 30
      storage-path: /var/erp/backups
    disaster-recovery:
      rpo-minutes: 60
      rto-minutes: 240
      replication-target: ""
    monitoring:
      metrics-enabled: true
      tracing-enabled: false

  benchmark:
    enabled: false
    warmup-iterations: 3
    measure-iterations: 10
    concurrent-users: 50

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
