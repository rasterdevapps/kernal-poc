# Test profile — uses H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:erp_kernel_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    locations: classpath:db/migration

  h2:
    console:
      enabled: false

erp:
  encryption:
    secret-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  api:
    jwt:
      secret-key: ZXJwLWtlcm5lbC1kZXYta2V5LW11c3QtYmUtMzItYnl0ZXM=
      expiration-minutes: 60
      issuer: erp-kernel-test
  security:
    ldap:
      enabled: false
    sso:
      enabled: false
